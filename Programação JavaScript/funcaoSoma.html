<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Arrow function
      const soma = (n1, n2) => {
        return n1 + n2;
      };
      let valor1 = parseInt(prompt("Informe o primeiro número"));
      let valor2 = parseInt(prompt("Informe o segundo número"));
      let resultado = soma(valor1, valor2);
      alert("o resultado da soma é " + resultado);
    </script>
  </body>
</html>
